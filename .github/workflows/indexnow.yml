name: IndexNow 流式推送

on:
  # push 到 main 分支时自动触发（仅内容变更时）
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'prisma/**'
      - '.github/workflows/**'
      - '.vercelignore'
  # 手动触发
  workflow_dispatch:

jobs:
  indexnow-submit:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 流式推送 IndexNow（限前 200 条）
        run: bash src/scripts/indexnow.sh 200
        working-directory: .
