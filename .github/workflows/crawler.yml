name: Daily AI Data Crawler

on:
  schedule:
    # 每天凌晨2点运行
    - cron: '0 2 * * *'
  workflow_dispatch: # 支持手动触发

jobs:
  crawl-tools:
    name: Crawl AI Tools
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Generate Prisma Client
      run: npx prisma generate
      
    - name: Run tools crawler
      run: npm run crawl
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        
    - name: Notify on failure
      if: failure()
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: '工具爬虫执行失败',
            body: `运行时间: ${new Date().toISOString()}\n请检查日志。`
          })

  crawl-news:
    name: Crawl AI News (RSS)
    runs-on: ubuntu-latest
    needs: crawl-tools
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Generate Prisma Client
      run: npx prisma generate
      
    - name: Run RSS news crawler
      run: npm run crawl:rss
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        
    - name: Notify on failure
      if: failure()
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: 'RSS 资讯爬虫执行失败',
            body: `运行时间: ${new Date().toISOString()}\n请检查日志。`
          })

  crawl-latest:
    name: Crawl Latest AI Tools
    runs-on: ubuntu-latest
    needs: crawl-news
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Generate Prisma Client
      run: npx prisma generate
      
    - name: Run latest tools crawler
      run: npm run crawl:latest
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        
    - name: Notify on failure
      if: failure()
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: '最新工具爬虫执行失败',
            body: `运行时间: ${new Date().toISOString()}\n请检查日志。`
          })
