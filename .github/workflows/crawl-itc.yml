name: Crawl ITC Projects

on:
  schedule:
    # 每天凌晨 3 点运行
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Setup Database
      run: |
        mkdir -p prisma
        touch prisma/dev.db
    
    - name: Run ITC Crawler
      env:
        DATABASE_URL: "file:./prisma/dev.db"
        TENCENT_TRANSLATE_SECRET_ID: ${{ secrets.TENCENT_TRANSLATE_SECRET_ID }}
        TENCENT_TRANSLATE_SECRET_KEY: ${{ secrets.TENCENT_TRANSLATE_SECRET_KEY }}
      run: npm run crawl:itc
    
    - name: Commit changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add prisma/dev.db
        git diff --staged --quiet || git commit -m "Update ITC projects data"
        git push
