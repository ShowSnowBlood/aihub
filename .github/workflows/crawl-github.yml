name: Crawl GitHub Trending

on:
  schedule:
    # 每天凌晨 4 点运行
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Setup Database
      run: |
        mkdir -p prisma
        touch prisma/dev.db
    
    - name: Run GitHub Trending Crawler
      env:
        DATABASE_URL: "file:./prisma/dev.db"
      run: npm run crawl:github
    
    - name: Commit changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add prisma/dev.db
        git diff --staged --quiet || git commit -m "Update GitHub trending data"
        git push
